{% extends "base.html" %}
{% block title %}Setup  -  Fjord3D{% endblock %}
{% block body %}
<div class="center-screen">
  <form class="login-card" method="post">
    <img class="auth-logo" src="{{ url_for('static', filename='logos/logos/fjord3D-logo-horizontal-transparent.png', v=app_build) }}" alt="Fjord3D">
    <h1>Første opsætning</h1>
    <p class="hint">Opret den første admin-konto.</p>
    {% if error %}<div class="status error">{{ error }}</div>{% endif %}

    <label for="first_name">Navn</label>
    <input id="first_name" name="first_name" type="text" autocomplete="given-name" required>

    <label for="last_name">Efternavn</label>
    <input id="last_name" name="last_name" type="text" autocomplete="family-name" required>

    <label for="username">Admin brugernavn</label>
    <input id="username" name="username" type="text" autocomplete="username" required>

    <label for="language">Sprog</label>
    <select id="language" name="language" class="select" autocomplete="language">
      {% set selected_lang = selected_language|default(default_language) %}
      {% for code, label in language_options %}
        <option value="{{ code }}" {% if code == selected_lang %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>

    <label for="password">Adgangskode</label>
    <input id="password" name="password" type="password" autocomplete="new-password" required>

    <label for="password2">Gentag adgangskode</label>
    <input id="password2" name="password2" type="password" autocomplete="new-password" required>

    <button class="btn primary" type="submit">Opret admin</button>
  </form>
</div>
{% endblock %}
