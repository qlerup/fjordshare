services:
  fjordshare:
    build:
      context: .
      args:
        BAMBUSTUDIO_APPIMAGE_URL: ${BAMBUSTUDIO_APPIMAGE_URL:-}
    container_name: fjordshare
    ports:
      - "${APP_PORT:-9090}:8080"
    environment:
      DATA_DIR: /data
      UPLOAD_ROOT: /uploads
      THUMBS_DIR: /thumbs
      TZ: ${TZ:-Europe/Copenhagen}
      BAMBUSTUDIO_BIN: ${BAMBUSTUDIO_BIN:-bambu-studio}
      BAMBUSTUDIO_CONFIG_PATH: ${BAMBUSTUDIO_CONFIG_PATH:-}
      BAMBUSTUDIO_PROFILE_ROOT: ${BAMBUSTUDIO_PROFILE_ROOT:-}
      BAMBUSTUDIO_TIMEOUT_SEC: ${BAMBUSTUDIO_TIMEOUT_SEC:-1800}
      BAMBUSTUDIO_PRINTER_PROFILES: ${BAMBUSTUDIO_PRINTER_PROFILES:-}
      BAMBUSTUDIO_PRINT_PROFILES: ${BAMBUSTUDIO_PRINT_PROFILES:-}
      BAMBUSTUDIO_FILAMENT_PROFILES: ${BAMBUSTUDIO_FILAMENT_PROFILES:-}
      BAMBUSTUDIO_LOAD_SETTINGS: ${BAMBUSTUDIO_LOAD_SETTINGS:-}
      BAMBUSTUDIO_LOAD_FILAMENTS: ${BAMBUSTUDIO_LOAD_FILAMENTS:-}
      BAMBUSTUDIO_ALLOW_PROFILE_FALLBACK: ${BAMBUSTUDIO_ALLOW_PROFILE_FALLBACK:-0}
      UI_VERSION_MARKER: ${UI_VERSION_MARKER:-}
    volumes:
      - "${DATA_DIR:-/volume1/docker/fjordshare/data}:/data"
      - "${UPLOADS_HOST_DIR:-/volume1/docker/fjordshare/uploads}:/uploads"
      - "${THUMBS_HOST_DIR:-/volume1/docker/fjordshare/thumbs}:/thumbs"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

