services:
  fjordshare:
    build:
      context: .
      args:
        BAMBUSTUDIO_APPIMAGE_URL: ${BAMBUSTUDIO_APPIMAGE_URL:-https://github.com/bambulab/BambuStudio/releases/download/v02.06.00.51/BambuStudio_ubuntu-22.04-v02.06.00.51-20260417160415.AppImage}
    container_name: fjordshare
    ports:
      - "${APP_PORT:-9090}:8080"
    command: >
      gunicorn wsgi:application
      --worker-class gthread
      --workers ${GUNICORN_WORKERS:-1}
      --threads ${GUNICORN_THREADS:-8}
      --bind 0.0.0.0:8080
      --timeout ${GUNICORN_TIMEOUT:-120}
      --graceful-timeout ${GUNICORN_GRACEFUL_TIMEOUT:-30}
      --keep-alive ${GUNICORN_KEEP_ALIVE:-5}
      --max-requests ${GUNICORN_MAX_REQUESTS:-1000}
      --max-requests-jitter ${GUNICORN_MAX_REQUESTS_JITTER:-100}
      --access-logfile - --error-logfile - --log-level ${GUNICORN_LOG_LEVEL:-info}
    environment:
      DATA_DIR: /data
      UPLOAD_ROOT: /uploads
      THUMBS_DIR: /thumbs
      TZ: ${TZ:-Europe/Copenhagen}
      BAMBUSTUDIO_BIN: ${BAMBUSTUDIO_BIN:-bambu-studio}
      BAMBUSTUDIO_CONFIG_PATH: ${BAMBUSTUDIO_CONFIG_PATH:-}
      BAMBUSTUDIO_PROFILE_ROOT: ${BAMBUSTUDIO_PROFILE_ROOT:-}
      BAMBUSTUDIO_TIMEOUT_SEC: ${BAMBUSTUDIO_TIMEOUT_SEC:-1800}
      BAMBUSTUDIO_PRINTER_PROFILES: ${BAMBUSTUDIO_PRINTER_PROFILES:-}
      BAMBUSTUDIO_PRINT_PROFILES: ${BAMBUSTUDIO_PRINT_PROFILES:-}
      BAMBUSTUDIO_FILAMENT_PROFILES: ${BAMBUSTUDIO_FILAMENT_PROFILES:-}
      BAMBUSTUDIO_LOAD_SETTINGS: ${BAMBUSTUDIO_LOAD_SETTINGS:-}
      BAMBUSTUDIO_LOAD_FILAMENTS: ${BAMBUSTUDIO_LOAD_FILAMENTS:-}
      BAMBUSTUDIO_ALLOW_PROFILE_FALLBACK: ${BAMBUSTUDIO_ALLOW_PROFILE_FALLBACK:-0}
      BAMBUSTUDIO_FAST_PRINTER_PROFILE: ${BAMBUSTUDIO_FAST_PRINTER_PROFILE:-Bambu Lab H2S 0.4 nozzle}
      BAMBUSTUDIO_FAST_PRINT_PROFILE: ${BAMBUSTUDIO_FAST_PRINT_PROFILE:-0.20mm Standard @BBL H2S}
      BAMBUSTUDIO_FAST_FILAMENT_PROFILE: ${BAMBUSTUDIO_FAST_FILAMENT_PROFILE:-Bambu ABS @BBL H2S}
      SLICING_DISABLED: ${SLICING_DISABLED:-1}
      SMS_TOKEN_ENCRYPTION_KEY: ${SMS_TOKEN_ENCRYPTION_KEY:-}
      UI_VERSION_MARKER: ${UI_VERSION_MARKER:-}
      STARTUP_RETRY_ATTEMPTS: ${STARTUP_RETRY_ATTEMPTS:-24}
      STARTUP_RETRY_DELAY_SEC: ${STARTUP_RETRY_DELAY_SEC:-5}
    volumes:
      - "${DATA_DIR:-/opt/fjordshare-data/appdata}:/data"
      - "${UPLOADS_HOST_DIR:-/opt/fjordshare-data/uploads}:/uploads"
      - "${THUMBS_HOST_DIR:-/opt/fjordshare-data/thumbs}:/thumbs"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
